    /* ============================================================
       AGENTFORCE MARKETING BOOTH QUIZ
       Design per client reference (Figma extract):
         bg gradient   #00B3FF -> #90D0FE -> #EAF5FE
         glass card    white @20% fill, gradient white border,
                       shadow 0 26px 26px #066AFE @30%
         buttons       #066AFE (client spec, Electric Blue 50)
         wrong answer  #0D1D58 navy
         headlines     #022AC0 (client spec)
       ============================================================ */

    :root {
      --grad-top:    #00B3FF;
      --grad-mid:    #90D0FE;
      --grad-bot:    #EAF5FE;
      --electric:    #066AFE;   /* CTA + correct answer (client spec) */
      --glow:        #066AFE;   /* card shadow color (per Figma spec) */
      --navy:        #0D1D58;   /* answer text + wrong answer bg */
      --headline:    #022AC0;   /* headline blue (client spec) */
      --card-radius: 40px;
      font-size: clamp(15px, 1.6vw, 20px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none; /* no long-press save/share sheets on kiosk */
    }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;          /* no iOS rubber-band bounce */
      -webkit-text-size-adjust: 100%;     /* no auto text inflation on rotate */
      font-family: "SF Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--navy);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      background: linear-gradient(180deg, var(--grad-top) 0%, var(--grad-mid) 48%, var(--grad-bot) 100%);
    }
    /* iPad Safari: 100% can misreport with browser chrome; dvh tracks the
       real visible area (incl. when the keyboard is up) */
    @supports (height: 100dvh) {
      #stage { height: 100dvh; }
    }
    img { pointer-events: none; -webkit-user-drag: none; }

    /* ---------- Stage / screens ---------- */
    #stage {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      /* no align/justify center here: .screen uses margin:auto instead, so
         when the iPad keyboard shrinks the viewport the card can scroll
         into view rather than clipping (flexbox overflow-centering fix) */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: calc(4vh + env(safe-area-inset-top)) calc(4vw + env(safe-area-inset-right))
               calc(4vh + env(safe-area-inset-bottom)) calc(4vw + env(safe-area-inset-left));
    }
    .screen {
      width: 100%;
      max-width: 700px;
      margin: auto;
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeIn 0.45s ease both;
    }
    .screen.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px) scale(0.99); }
      to   { opacity: 1; transform: none; }
    }

    /* ---------- Glass card (per Figma: fill #FFF 20%, gradient border,
                  drop shadow 0 26 26 #066AFE 30%) ---------- */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.20);
      border-radius: var(--card-radius);
      box-shadow: 0 26px 26px rgba(6, 106, 254, 0.30);
      padding: clamp(28px, 5vw, 56px) clamp(24px, 5vw, 52px);
      width: 100%;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    /* gradient white border: 25% -> 100% @45% -> 25% */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.25) 0%,
        rgba(255,255,255,1)    45%,
        rgba(255,255,255,0.25) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
              mask-composite: exclude;
      pointer-events: none;
    }

    /* ---------- Logo ---------- */
    .logo {
      /* client-supplied SVG, inlined as markup so it can never fail to
         load. Glow is CSS below — tune the blur radius / opacity here
         for more or less halo. */
      width: clamp(88px, 13vw, 118px);
      height: auto;
      margin: 2px auto 26px;
      display: block;
      filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.55));
    }

    h1, h2, .btn, .score-num {
      font-family: "SF Display", "SF Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    h1 {
      font-size: clamp(1.9rem, 5vw, 2.9rem);
      font-weight: 600;
      margin: 0 0 22px;
      line-height: 1.15;
      color: var(--headline);
    }
    h2 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 600;
      margin: 4px 0 34px;
      line-height: 1.2;
      color: var(--headline);
    }
    p { font-size: clamp(1rem, 2.2vw, 1.2rem); font-weight: 600; line-height: 1.5; margin: 0 0 34px; color: var(--navy); }
    .muted { color: var(--navy); opacity: 0.55; font-size: 0.95rem; }

    .q-label {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 600;
      color: var(--navy);
      margin: 0 0 6px;
    }

    /* ---------- Buttons ---------- */
    .btn {
      appearance: none; border: none; cursor: pointer;
      font-size: clamp(1.05rem, 2.4vw, 1.3rem);
      font-weight: 600;
      padding: 18px 44px;
      border-radius: 999px;
      background: var(--electric);
      color: #fff;
      box-shadow: 0 12px 26px rgba(6, 106, 254, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .btn:active { transform: scale(0.96); box-shadow: 0 6px 14px rgba(6,106,254,0.35); }
    /* hover lift — only on devices that truly hover (mouse/trackpad),
       so touch tablets never get a stuck hover state */
    @media (hover: hover) {
      .btn:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 18px 34px rgba(6, 106, 254, 0.45);
        filter: brightness(1.06);
      }
      .btn.pulse:hover { animation: none; }
      .btn.ghost:hover {
        background: rgba(255,255,255,0.7);
        box-shadow: 0 10px 22px rgba(6, 106, 254, 0.18);
        filter: none;
      }
    }
    .btn.big { padding: 20px 58px; font-size: clamp(1.15rem, 2.8vw, 1.45rem); }
    .btn.ghost {
      background: rgba(255,255,255,0.45);
      color: var(--navy);
      box-shadow: none;
    }

    .pulse { animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.05); }
    }

    /* ---------- Progress dots ---------- */
    .progress {
      display: flex; gap: 14px; justify-content: center; margin: 4px 0 38px;
    }
    .pip {
      width: 15px; height: 15px; border-radius: 50%;
      background: rgba(255,255,255,0.45);
      transition: background 0.3s ease;
    }
    .pip.done, .pip.current { background: #fff; }

    /* ---------- Answers ---------- */
    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 10px;
    }
    @media (max-width: 560px) { .answers { grid-template-columns: 1fr; } }

    .answer {
      appearance: none; border: none; cursor: pointer;
      font-family: inherit;
      text-align: center;
      font-size: clamp(0.98rem, 2.2vw, 1.18rem);
      font-weight: 600;
      padding: 16px 18px;
      border-radius: 14px;
      background: #fff;
      color: var(--navy);
      box-shadow: 0 6px 14px rgba(6, 106, 254, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease, color 0.2s ease, opacity 0.2s ease;
      min-height: 68px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1.25;
    }
    .answer:active { transform: scale(0.98); }
    @media (hover: hover) {
      .answers:not(.locked) .answer:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 14px 26px rgba(6, 106, 254, 0.22);
      }
    }
    .answer.correct { background: var(--electric); color: #fff; }
    .answer.wrong   { background: var(--navy);     color: #fff; }
    .answers.locked .answer { pointer-events: none; }

    /* ---------- Email capture ---------- */
    .field {
      width: 100%;
      max-width: 440px;
      font-family: inherit;
      font-size: 1.25rem;
      font-weight: 600;
      padding: 18px 24px;
      border-radius: 16px;
      border: none;
      outline: none;
      margin: 6px auto;
      display: block;
      text-align: center;
      color: var(--navy);
      background: #fff;
      box-shadow: 0 8px 18px rgba(6, 106, 254, 0.15);
    }

       `answer` is the index (0-3) of the correct option.

    const QUESTIONS = [
      {
        q: "Who can it deliver adaptive experiences for?",
        options: ["Your top accounts", "Whoever’s easiest to reach", "Every customer", "Nobody yet"],
        answer: 2
      },
      {
        q: "What orchestrates every experience?",
        options: ["An agency of agents", "One overworked chatbot", "Magic", "None of the above"],

      },

        answer: 3

        options: ["Scale across every channel", "Qualify leads around the clock", "Surface insights proactively", "All of the above"],
        answer: 3
      }
    ];

    /* ============================================================
       PRIZE-CLAIM ENDPOINT (Google Sheet via Apps Script web app)
       ============================================================ */
    const RAFFLE_ENDPOINT = "https://script.google.com/macros/s/AKfycbxXOH0j1RfBn3LzRiW-ZzcWOtNzvI6JW48qEl3_Nr9SnSMEPmrhWNKum1pZa3r1fF-D/exec";

    /* ---------- Timing config ---------- */
    const FEEDBACK_MS = 850;       // how long right/wrong flash shows before advancing
    const IDLE_RESET_MS = 20000;   // auto-reset to Start after inactivity
    const THANKS_RESET_MS = 10000;
    const EMAIL_AUTOSKIP_MS = 25000; // email screen auto-skips after this much idle time
                                     // (the countdown resets whenever the user types)

    /* ---------- State ---------- */
    let current = 0;
    let score = 0;
    let idleTimer = null;
    let thanksTimer = null;
    let emailTick = null;        // 1-second interval driving the email countdown
    let emailRemaining = 0;      // seconds left before auto-skip

    /* ---------- Screen helpers ---------- */
    const screens = {
      start:  document.getElementById("screen-start"),
      quiz:   document.getElementById("screen-quiz"),
      result: document.getElementById("screen-result"),
      email:  document.getElementById("screen-email"),
      thanks: document.getElementById("screen-thanks")
    };
    function show(name) {
      Object.values(screens).forEach(s => s.classList.remove("active"));
      screens[name].classList.add("active");
    }

    // Score denominator follows the question count automatically.
    document.getElementById("score-total").textContent = QUESTIONS.length;

    /* ---------- Progress dots ---------- */
    const progressEl = document.getElementById("progress");
    function renderProgress() {
      progressEl.innerHTML = "";
      QUESTIONS.forEach((_, i) => {
        const pip = document.createElement("div");
        pip.className = "pip" + (i < current ? " done" : i === current ? " current" : "");
        progressEl.appendChild(pip);
      });
    }

    /* ---------- Render a question ---------- */
    const questionLabel = document.getElementById("question-label");
    const questionText = document.getElementById("question-text");
    const answersEl = document.getElementById("answers");

    function renderQuestion() {
      renderProgress();
      const item = QUESTIONS[current];
      questionLabel.textContent = "Question " + (current + 1);
      questionText.textContent = item.q;
      answersEl.className = "answers";
      answersEl.innerHTML = "";
      item.options.forEach((opt, i) => {
        const b = document.createElement("button");
        b.className = "answer";
        b.textContent = opt;
        b.addEventListener("click", () => onAnswer(i, b));
        answersEl.appendChild(b);
      });
    }

    function onAnswer(choice, btn) {
      const item = QUESTIONS[current];
      answersEl.classList.add("locked");
      const buttons = Array.from(answersEl.children);

      if (choice === item.answer) {
        score++;
        btn.classList.add("correct");
        // star burst from the tapped answer
        const r = btn.getBoundingClientRect();
        burstStars(0.5, r.left + r.width / 2, r.top + r.height / 2);
      } else {
        btn.classList.add("wrong");
        buttons[item.answer].classList.add("correct"); // reveal the right one
      }

      setTimeout(() => {
        current++;
        if (current < QUESTIONS.length) {
          renderQuestion();
        } else {
          showResult();
        }
      }, FEEDBACK_MS);
    }

    /* ---------- Result ---------- */
    function showResult() {
      const headline = document.getElementById("result-headline");
      const sub = document.getElementById("result-sub");
      const scoreVal = document.getElementById("score-val");

      // count-up animation
      let n = 0;
      scoreVal.textContent = "0";
      const step = () => {
        if (n < score) { n++; scoreVal.textContent = String(n); setTimeout(step, 180); }
      };
      step();

      if (score === QUESTIONS.length) { headline.textContent = "Perfect score!"; sub.textContent = "You really know Agentforce Marketing."; }
      else if (score >= 3)           { headline.textContent = "Nice work!";     sub.textContent = "Let’s get you your prize."; }
      else                            { headline.textContent = "Thanks for playing!"; sub.textContent = "Everyone can claim a prize."; }

      show("result");
      burstStars(1);
    }

    /* ---------- Email capture ---------- */
    const emailForm = document.getElementById("email-form");
    const emailInput = document.getElementById("email-input");
    const emailError = document.getElementById("email-error");
    const countdownEl = document.getElementById("email-countdown");

    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    }

    /* ---------- Email screen: show + auto-skip countdown ---------- */
    // Keeps the booth line moving: an idle email screen auto-skips after
    // EMAIL_AUTOSKIP_MS. The countdown is reset on every keystroke, so a
    // person actively typing their email is never cut off.
    function showEmail() {
      show("email");
      startEmailCountdown();
      emailInput.focus();
    }
    function startEmailCountdown() {
      emailRemaining = Math.round(EMAIL_AUTOSKIP_MS / 1000);
      renderCountdown();
      clearInterval(emailTick);
      emailTick = setInterval(() => {
        emailRemaining--;
        renderCountdown();
        if (emailRemaining <= 0) skipEmail();
      }, 1000);
    }
    function resetEmailCountdown() {
      if (emailTick) { emailRemaining = Math.round(EMAIL_AUTOSKIP_MS / 1000); renderCountdown(); }
    }
    function stopEmailCountdown() {
      clearInterval(emailTick);
      emailTick = null;
    }
    function renderCountdown() {
      countdownEl.textContent = "Skipping in " + Math.max(0, emailRemaining) + "s…";
    }

    // Typing keeps a real player from being auto-skipped.
    emailInput.addEventListener("input", resetEmailCountdown);

    function skipEmail() {
      stopEmailCountdown();
      goThanks(false);
    }

    emailForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const val = emailInput.value.trim();
      if (!isValidEmail(val)) {
        emailError.textContent = "Please enter a valid email address.";
        emailInput.focus();
        return;
      }
      emailError.textContent = "";

      const entry = { email: val, score: score, at: new Date().toISOString() };

      // Local backup — always kept, even if the network send fails.
      try {
        const entries = JSON.parse(localStorage.getItem("raffleEntries") || "[]");
        entries.push(entry);
        localStorage.setItem("raffleEntries", JSON.stringify(entries));
      } catch (err) { /* ignore storage errors */ }

      // Send to the Google Sheet (Apps Script web app), if configured.
      // text/plain avoids a CORS preflight that Apps Script can't answer.
      // Fire-and-forget: we advance immediately so a wifi blip never
      // traps a player at the booth. The local backup covers failures.
      if (RAFFLE_ENDPOINT) {
        fetch(RAFFLE_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ email: val, score: score })
        }).catch(err => console.warn("Entry send failed (kept local backup):", err));
      } else {
        console.log("[PROTOTYPE] No endpoint set — entry saved locally only:", val);
      }

      stopEmailCountdown();
      goThanks(true);
    });

    /* ---------- Thank-you + auto reset ---------- */
    // entered=true  → they submitted an email (prize confirmation)
    // entered=false → they skipped / were auto-skipped (no prize claim)
    function goThanks(entered) {
      const headline = document.getElementById("thanks-headline");
      const sub = document.getElementById("thanks-sub");
      if (entered) {
        headline.textContent = "You’re all set!";
        sub.textContent = "Show this screen at the booth to claim your prize.";
        burstStars(1.2);
      } else {
        headline.textContent = "Thanks for playing!";
        sub.textContent = "Hope you enjoyed the quiz.";
      }
      show("thanks");
      clearTimeout(thanksTimer);
      thanksTimer = setTimeout(resetAll, THANKS_RESET_MS);
    }

    function resetAll() {
      current = 0;
      score = 0;
      emailInput.value = "";
      emailError.textContent = "";
      stopEmailCountdown();
      clearTimeout(thanksTimer);
      show("start");
    }

    /* ---------- Idle auto-reset (kiosk safety) ---------- */
    function bumpIdle() {
      clearTimeout(idleTimer);
      // Only auto-reset mid-game, not on the start screen.
      // The email screen runs its own visible auto-skip countdown,
      // so we don't double up with the generic idle reset there.
      if (!screens.start.classList.contains("active") &&
          !screens.email.classList.contains("active")) {
        idleTimer = setTimeout(resetAll, IDLE_RESET_MS);
      }
    }
    ["click", "touchstart", "keydown"].forEach(evt =>
      document.addEventListener(evt, bumpIdle, { passive: true })
    );

    /* ---------- Wiring ---------- */
    document.getElementById("btn-start").addEventListener("click", () => {
      current = 0; score = 0;
      renderQuestion();
      show("quiz");
    });
    document.getElementById("btn-to-email").addEventListener("click", showEmail);
    document.getElementById("btn-skip").addEventListener("click", skipEmail);
    document.getElementById("btn-restart").addEventListener("click", resetAll);

    /* ============================================================
       Star burst (canvas) — uses the client's yellow star asset
       instead of confetti.
       ============================================================ */
    const cv = document.getElementById("stars");
    const ctx = cv.getContext("2d");
    let pieces = [];
    function sizeCanvas() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
    sizeCanvas();
    window.addEventListener("resize", sizeCanvas);

    const starImg = new Image();
    starImg.src = STAR_DATA;

    // Vector fallback star, drawn if the image ever can't render —
    // the burst must never silently disappear.
    function drawFallbackStar(c, s) {
      c.beginPath();
      const o = s / 2, i = s / 5.5;
      for (let k = 0; k < 8; k++) {
        const r = k % 2 === 0 ? o : i;
        const a = (Math.PI / 4) * k - Math.PI / 2;
        c[k === 0 ? "moveTo" : "lineTo"](Math.cos(a) * r, Math.sin(a) * r);
      }
      c.closePath();
      c.fillStyle = "#FFD73B";
      c.fill();
    }

    // burstStars(scale [, x, y]) — omit x/y for a center-stage burst.
    // Stars pop in with an overshoot, fly out in two quick waves,
    // spin fast and twinkle as they fall.
    function burstStars(scale, x, y) {
      const cx = x == null ? cv.width / 2 : x;
      const cy = y == null ? cv.height * 0.35 : y;
      const count = Math.round(24 * (scale || 1));
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 5 + Math.random() * 11;
        pieces.push({
          x: cx + (Math.random() - 0.5) * 26,
          y: cy + (Math.random() - 0.5) * 18,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 7.5,
          g: 0.3 + Math.random() * 0.2,
          size: 18 + Math.random() * 38,
          rot: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 0.5,
          life: 0,
          maxLife: 70 + Math.random() * 55,
          delay: i % 2 === 0 ? 0 : Math.floor(Math.random() * 10) + 4, // second wave
          twinkle: Math.random() * Math.PI * 2
        });
      }
      if (!rafOn) { rafOn = true; requestAnimationFrame(tick); }
    }
    let rafOn = false;
    function tick() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      pieces.forEach(p => {
        if (p.delay > 0) { p.delay--; return; }
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life++;
        // pop-in: overshoot to 120% then settle to full size
        let pop;
        if      (p.life < 6)  pop = (p.life / 6) * 1.2;
        else if (p.life < 12) pop = 1.2 - ((p.life - 6) / 6) * 0.2;
        else                  pop = 1;
        // twinkle shimmer + end-of-life fade
        const shimmer = 0.82 + 0.18 * Math.sin(p.life * 0.55 + p.twinkle);
        const fade = p.life > p.maxLife * 0.65
          ? Math.max(0, 1 - (p.life - p.maxLife * 0.65) / (p.maxLife * 0.35))
          : 1;
        const s = p.size * pop;
        ctx.save();
        ctx.globalAlpha = fade * shimmer;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        // naturalWidth > 0 = image actually decoded; a broken image would
        // make drawImage throw and kill the whole animation loop, so we
        // guard and fall back to a vector star instead.
        if (starImg.naturalWidth > 0) {
          try { ctx.drawImage(starImg, -s / 2, -s / 2, s, s); }
          catch (e) { drawFallbackStar(ctx, s); }
        } else {
          drawFallbackStar(ctx, s);
        }
        ctx.restore();
      });
      pieces = pieces.filter(p => p.delay > 0 || (p.y < cv.height + 60 && p.life < p.maxLife));
      if (pieces.length) { requestAnimationFrame(tick); } else { rafOn = false; ctx.clearRect(0,0,cv.width,cv.height); }
    }

    /* ---------- Fullscreen on first tap (kiosk nicety) ---------- */
    document.body.addEventListener("click", function once() {
      const el = document.documentElement;
      if (el.requestFullscreen) { el.requestFullscreen().catch(()=>{}); }
      document.body.removeEventListener("click", once);
    }, { once: true });

  })();
  </script>
</body>
</html>
